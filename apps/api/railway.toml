# Railway's builder skips this file (only repo-root config paths apply). Use /railway.api.toml
# in Dashboard → Service → Settings → Config as Code. Keep this file in sync with that file.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = [
  "apps/api/**",
  "package.json",
  "package-lock.json",
]

[deploy]
# Let Dockerfile CMD handle the start command (apps/api/dist/main.js)
# startCommand is commented out to use Dockerfile's CMD

# Healthcheck to verify the server is actually up nicely
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# NOTE: Environment variables are managed in the Railway Dashboard!
# Do NOT verify variables here to allow true Dev/Prod separation.
