# File overview:
# - Purpose: Local development services for Postgres and Redis.
# - Reached from: `MVP/scripts/run-local-e2e.sh` to bring up DBs before server start.
# - Services: postgres:15 (kc_db) with volume; redis:7 default.
services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: kc
      # IMPORTANT: Set a secure password here for local development
      # This should match the password in your .env DATABASE_URL
      # Example: postgresql://kc:YOUR_PASSWORD_HERE@localhost:5435/kc_db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
      POSTGRES_DB: kc_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:


