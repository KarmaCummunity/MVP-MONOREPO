sonar.projectKey=KarmaCummunity_KC-MVP-server
sonar.organization=karmacummunity

sonar.sources=src
sonar.exclusions=src/**/*.spec.ts,src/**/*.test.ts,src/scripts/**,dist/**,node_modules/**

sonar.tests=src
sonar.test.inclusions=src/**/*.spec.ts,src/**/*.test.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Quality Gate - Focus on New Code Only
# This ensures we only fail on NEW issues, not existing technical debt
sonar.qualitygate.wait=true
sonar.newCode.referenceBranch=main

# New Code Period Definition
# Analysis will focus only on code changed since the last version on main branch
# sonar.pullrequest.base=main

# Coverage requirements for new code only
sonar.coverage.exclusions=src/**/*.spec.ts,src/**/*.test.ts,src/scripts/**
