# Railway — KC Vision Web (Dockerfile under apps/mobile for historical path).
#
# Root Directory MUST be empty (repo root) in Railway service settings.
# Setting it to apps/mobile excludes apps/kc-vision-web from the Docker build
# context, breaking every COPY apps/kc-vision-web/... instruction.
# This was fixed via API: serviceInstanceUpdate rootDirectory → "" (2026-05-05).
#
# Watch paths are relative to repo root (Railway docs: patterns are from /).

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/mobile/Dockerfile"
watchPatterns = [
  "apps/mobile/Dockerfile",
  "apps/mobile/web/**",
  "apps/kc-vision-web/**",
  "package.json",
  "package-lock.json",
]

[deploy]
startCommand = ""
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

