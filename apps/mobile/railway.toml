# Railway — KC Vision Web (Dockerfile under apps/mobile for historical path).
#
# CRITICAL — Root Directory: leave EMPTY (repo root) in Railway service settings.
# If Root Directory is apps/mobile, Docker build context excludes apps/kc-vision-web
# and COPY apps/kc-vision-web/... fails. Use dockerfilePath below; do not chroot the service.
#
# Watch paths assume repo root as above (Railway docs: patterns are from /).

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/mobile/Dockerfile"
watchPatterns = [
  "apps/mobile/Dockerfile",
  "apps/mobile/web/**",
  "apps/kc-vision-web/**",
  "package.json",
  "package-lock.json",
]

[deploy]
startCommand = ""
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

