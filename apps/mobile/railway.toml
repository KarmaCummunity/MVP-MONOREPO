# Railway Configuration — deploy only when web app or install manifests change.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/mobile/Dockerfile"
watchPatterns = [
  "apps/mobile/Dockerfile",
  "apps/mobile/web/**",
  "apps/kc-vision-web/**",
  "package.json",
  "package-lock.json",
]

[deploy]
startCommand = ""
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

