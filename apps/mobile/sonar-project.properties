sonar.projectKey=KarmaCummunity_MVP
sonar.organization=karmacummunity

sonar.sources=app,bottomBarScreens,components,context,donationScreens,globals,hooks,locales,navigations,screens,stores,topBarScreens,utils
sonar.exclusions=node_modules/**,build/**,dist/**,**/*.spec.ts,**/*.test.ts,**/*.test.tsx,../../tools/quality/snyk/**,**/snyk-code*.json

# Dev/CI tooling under scripts/ duplicates patterns heavily; exclude from CPD so new-code duplication gate stays meaningful for app sources.
sonar.cpd.exclusions=scripts/**

sonar.tests=.
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Standalone config for SonarCloud (avoids `extends: expo/tsconfig.base` when node_modules is absent).
sonar.typescript.tsconfigPath=tsconfig.sonar.json
