# Web (Expo) service — set in Railway: Service → Settings → Config as Code → /railway.mobile.toml
# (Nested apps/mobile/railway.toml is skipped by Railway.)

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/mobile/Dockerfile"
watchPatterns = [
  "apps/mobile/**",
  "package.json",
  "package-lock.json",
]

[deploy]
startCommand = ""
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
